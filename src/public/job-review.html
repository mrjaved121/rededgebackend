<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Edge — Job Review</title>
  <style>
    :root {
      --primary: #2563EB;
      --primary-hover: #1D4ED8;
      --primary-light: #EFF4FF;
      --brand: #C0392B;
      --brand-dark: #A62F20;
      --ink: #0F172A;
      --ink-soft: #475467;
      --ink-faint: #98A2B3;
      --border: #E4E7EC;
      --surface: #FFFFFF;
      --bg: #F7F8FA;
      --success: #067647;
      --success-bg: #ECFDF3;
      --warning: #B54708;
      --warning-bg: #FFFAEB;
      --danger: #DC2626;
      --danger-hover: #B91C1C;
      --danger-bg: #FEF2F2;
      --radius-lg: 14px;
      --radius: 10px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(16,24,40,.06);
      --shadow-md: 0 8px 24px rgba(16,24,40,.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    svg.icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; vertical-align: middle; }

    /* ── Login ─────────────────────────────────────────────────── */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: radial-gradient(circle at top, #16233F 0%, #0F172A 60%); }
    .login-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 40px; width: 380px; }
    .brand-logo { height: 40px; width: auto; display: block; margin-bottom: 20px; }
    .login-card h1 { font-size: 21px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
    .login-card p.tagline { color: var(--ink-soft); font-size: 14px; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
    .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; font-family: inherit; }
    .field input:focus, .field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .alert { display: none; align-items: flex-start; gap: 8px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
    .alert.error { background: var(--danger-bg); color: var(--danger); }
    .alert svg { width: 16px; height: 16px; margin-top: 1px; }

    /* ── App shell ─────────────────────────────────────────────── */
    #app-screen { display: none; min-height: 100vh; }
    .topbar { background: var(--ink); color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 20; }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .topbar-brand .brand-logo-wrap { background: #fff; border-radius: 6px; padding: 4px 8px; display: flex; align-items: center; }
    .topbar-brand .brand-logo { height: 22px; width: auto; display: block; margin-bottom: 0; }
    .topbar-brand-text span { font-size: 15px; font-weight: 700; line-height: 1.2; }

    .container { max-width: 1180px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
    .page-head h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; }
    .page-head .subtitle { color: var(--ink-soft); font-size: 14px; max-width: 520px; }

    /* ── Stat cards ────────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .stats-grid { grid-template-columns: 1fr; } }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 20px; display: flex; align-items: center; gap: 14px; }
    .stat-card .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-card .stat-icon svg { width: 22px; height: 22px; }
    .stat-icon.blue { background: var(--primary-light); color: var(--primary); }
    .stat-icon.amber { background: var(--warning-bg); color: var(--warning); }
    .stat-icon.green { background: var(--success-bg); color: var(--success); }
    .stat-icon.gray { background: #F2F4F7; color: var(--ink-soft); }
    .stat-value { font-size: 24px; font-weight: 700; line-height: 1.1; }
    .stat-label { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

    /* ── Cards ─────────────────────────────────────────────────── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 24px; margin-bottom: 20px; }
    .card-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
    .card-toolbar h2 { font-size: 16px; font-weight: 700; }
    .toolbar-controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-box { position: relative; width: 240px; }
    .search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--ink-faint); }
    .search-box input { width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13.5px; outline: none; font-family: inherit; transition: border-color .15s, box-shadow .15s; }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    select.filter-select { padding: 9px 30px 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13.5px; outline: none; font-family: inherit; background: var(--surface); color: var(--ink); cursor: pointer; }
    select.filter-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

    /* ── Form controls ─────────────────────────────────────────── */
    label.field-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
    input[type="text"], textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; outline: none; background: var(--surface); font-family: inherit; color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    textarea { resize: vertical; min-height: 56px; }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; cursor: pointer; border: none; transition: background .15s, box-shadow .15s, opacity .15s; font-family: inherit; white-space: nowrap; }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-primary:disabled { background: #C7D7FE; cursor: not-allowed; }
    .btn-secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #F2F4F7; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #05602f; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-hover); }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #F2F4F7; }
    .btn-sm { padding: 7px 12px; font-size: 12.5px; }
    .btn-icon { width: 30px; height: 30px; padding: 0; justify-content: center; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--ink-soft); }
    .btn-icon:hover { background: #F2F4F7; }
    .btn-icon.danger-outline { color: var(--danger); }
    .btn-icon.danger-outline:hover { background: var(--danger-bg); border-color: #FCA5A5; }
    .btn-topbar { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .btn-topbar:hover { background: rgba(255,255,255,0.16); }

    /* ── Table ─────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table.jobs { width: 100%; border-collapse: collapse; }
    table.jobs th { text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-faint); font-weight: 600; padding: 0 12px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    table.jobs td { padding: 14px 12px; border-bottom: 1px solid #F2F4F7; font-size: 14px; vertical-align: middle; }
    table.jobs tr:last-child td { border-bottom: none; }
    table.jobs tr:hover td { background: #FBFBFC; cursor: pointer; }
    .job-title { font-weight: 600; color: var(--ink); }
    .job-sub { font-size: 12.5px; color: var(--ink-faint); margin-top: 2px; }
    .badge { display: inline-block; background: #F2F4F7; color: var(--ink-soft); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
    .badge.status-draft { background: #F2F4F7; color: var(--ink-soft); }
    .badge.status-pending { background: var(--primary-light); color: var(--primary); }
    .badge.status-in_progress { background: var(--primary-light); color: var(--primary); }
    .badge.status-needs_approval { background: var(--warning-bg); color: var(--warning); }
    .badge.status-completed { background: var(--success-bg); color: var(--success); }
    .progress-text { font-variant-numeric: tabular-nums; color: var(--ink-soft); font-size: 13px; }
    .row-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-faint); }
    .empty-state svg { width: 32px; height: 32px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }

    .loading-row { display: flex; align-items: center; gap: 10px; padding: 20px 4px; color: var(--ink-soft); font-size: 14px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Job detail modal ─────────────────────────────────────────*/
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 26px; width: 100%; max-width: 420px; position: relative; }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .modal > p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
    .modal-close { position: absolute; top: 18px; right: 18px; background: none; border: none; cursor: pointer; color: var(--ink-faint); padding: 4px; }

    .job-modal { max-width: 760px; max-height: 88vh; display: flex; flex-direction: column; }
    .job-modal-header { padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .job-modal-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; padding-right: 30px; }
    .job-modal-title-row h3 { font-size: 18px; }
    .job-meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px 20px; margin-top: 14px; }
    .job-meta-item .label { font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-faint); font-weight: 600; margin-bottom: 3px; }
    .job-meta-item .value { font-size: 13.5px; color: var(--ink); }
    .job-modal-body { overflow-y: auto; flex: 1; margin: 0 -26px; padding: 0 26px; }
    .approval-banner { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--warning-bg); border: 1px solid #FEDF89; border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 18px; flex-wrap: wrap; }
    .approval-banner p { font-size: 13.5px; color: var(--warning); font-weight: 600; }
    .approval-banner .actions { display: flex; gap: 8px; }

    .step-row { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
    .step-row.section-header-row { border: none; padding: 4px 0 4px; margin-top: 12px; margin-bottom: 4px; }
    .step-row.section-header-row .step-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-faint); }
    .step-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .step-head input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
    .step-title-block { flex: 1; }
    .step-title-block .num { color: var(--ink-faint); font-size: 12.5px; font-weight: 600; margin-right: 4px; }
    .step-title-block .title { font-weight: 600; font-size: 14px; }
    .step-title-block .desc { font-size: 12.5px; color: var(--ink-faint); margin-top: 2px; }
    .step-value-row { margin: 8px 0; }
    .step-value-row input[type="text"] { margin-bottom: 0; }
    .step-value-row select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13.5px; font-family: inherit; background: var(--surface); }
    .step-notes { margin: 8px 0; }
    .step-notes textarea { font-size: 13px; }
    .step-photos { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .step-photo { position: relative; width: 72px; height: 72px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
    .step-photo img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
    .step-photo .remove-photo { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: rgba(15,23,42,0.65); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
    .step-photo .remove-photo svg { width: 12px; height: 12px; }
    .step-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .step-footer .req-photo-flag { font-size: 12px; color: var(--ink-faint); display: flex; align-items: center; gap: 4px; }
    .step-footer .req-photo-flag svg { width: 13px; height: 13px; }

    /* ── Toasts ────────────────────────────────────────────────── */
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; max-width: 340px; }
    .toast { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--primary); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); padding: 12px 14px; font-size: 13.5px; animation: toast-in .2s ease-out; }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
    .toast.success svg { color: var(--success); }
    .toast.error svg { color: var(--danger); }
    .toast span { color: var(--ink); line-height: 1.4; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img class="brand-logo" src="/job-review/logo.jpg" alt="Red Edge Resources" />
    <p class="tagline">Job Review — admin sign in</p>
    <div id="login-error" class="alert error">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="login-error-text"></span>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="login()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="brand-logo-wrap">
        <img class="brand-logo" src="/job-review/logo.jpg" alt="Red Edge Resources" />
      </div>
      <div class="topbar-brand-text">
        <span>Job Review</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <a class="btn btn-topbar btn-sm" href="/checklist-manager/" style="text-decoration:none">
        <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Checklist Manager
      </a>
      <button class="btn btn-topbar btn-sm" onclick="logout()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </nav>

  <main class="container">
    <div class="page-head">
      <div>
        <h1>Job Review</h1>
        <p class="subtitle">Check and correct what installers submit in the field — steps, notes, and photos — and approve completed jobs.</p>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- Jobs table -->
    <section class="card">
      <div class="card-toolbar">
        <h2>Jobs</h2>
        <div class="toolbar-controls">
          <div class="search-box">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search job #, title, company…" oninput="onSearchInput()" />
          </div>
          <select class="filter-select" id="status-filter" onchange="applyFilters()">
            <option value="all">All statuses</option>
            <option value="draft">Draft</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In progress</option>
            <option value="needs_approval">Needs approval</option>
            <option value="completed">Completed</option>
          </select>
          <select class="filter-select" id="system-filter" onchange="applyFilters()">
            <option value="all">All machines</option>
          </select>
        </div>
      </div>
      <div id="jobs-list">
        <div class="loading-row"><span class="spinner"></span>Loading jobs…</div>
      </div>
    </section>
  </main>
</div>

<!-- JOB DETAIL MODAL -->
<div class="modal-overlay" id="job-modal">
  <div class="modal job-modal">
    <button class="modal-close" onclick="closeJobModal()"><svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="job-modal-header">
      <div class="job-modal-title-row">
        <h3 id="job-modal-title">Job</h3>
        <span class="badge" id="job-modal-status-badge"></span>
      </div>
      <div class="job-meta-grid" id="job-modal-meta"></div>
    </div>
    <div class="job-modal-body" id="job-modal-body">
      <div class="loading-row"><span class="spinner"></span>Loading job…</div>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirm-cancel-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div id="toast-container"></div>

<script>
  const BASE = window.location.origin;
  let token = localStorage.getItem('re_token') || '';
  let jobs = [];
  let currentJobId = null;
  let searchDebounce = null;

  // ── Toasts ───────────────────────────────────────────────────────
  function showToast(message, type) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'error'
      ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      : '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
    toast.innerHTML = `${icon}<span></span>`;
    toast.querySelector('span').textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4500);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function statusLabel(status) {
    return String(status || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // ── Confirm modal ────────────────────────────────────────────────
  function confirmModal(title, message, confirmLabel) {
    return new Promise((resolve) => {
      const overlay = document.getElementById('confirm-modal');
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-message').textContent = message;
      const okBtn = document.getElementById('confirm-ok-btn');
      const cancelBtn = document.getElementById('confirm-cancel-btn');
      okBtn.textContent = confirmLabel || 'Confirm';
      overlay.classList.add('show');

      function cleanup(result) {
        overlay.classList.remove('show');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        overlay.removeEventListener('click', onOverlay);
        resolve(result);
      }
      function onOk() { cleanup(true); }
      function onCancel() { cleanup(false); }
      function onOverlay(e) { if (e.target === overlay) cleanup(false); }

      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      overlay.addEventListener('click', onOverlay);
    });
  }

  document.addEventListener('click', (e) => {
    if (e.target === document.getElementById('job-modal')) closeJobModal();
  });

  // ── Auth ────────────────────────────────────────────────────────
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      const res = await fetch(`${BASE}/api/v1/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      if (data.user && data.user.role !== 'admin') throw new Error('Admin access required');
      token = data.token;
      localStorage.setItem('re_token', token);
      showApp();
    } catch (e) {
      document.getElementById('login-error-text').textContent = e.message;
      errEl.style.display = 'flex';
    }
  }

  function logout() {
    localStorage.removeItem('re_token');
    token = '';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // ── App ──────────────────────────────────────────────────────────
  async function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    await Promise.all([loadJobs(), loadSystemTypeFilter()]);
  }

  async function loadSystemTypeFilter() {
    try {
      const res = await fetch(`${BASE}/api/v1/system-types`, { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      const select = document.getElementById('system-filter');
      (data.systemTypes || []).forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.name;
        opt.textContent = t.name;
        select.appendChild(opt);
      });
    } catch (e) {
      // Non-fatal — filter just won't have machine options
    }
  }

  function onSearchInput() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(applyFilters, 350);
  }

  function applyFilters() {
    loadJobs();
  }

  async function loadJobs() {
    const listEl = document.getElementById('jobs-list');
    const status = document.getElementById('status-filter').value;
    const system = document.getElementById('system-filter').value;
    const search = document.getElementById('search-input').value.trim();

    const params = new URLSearchParams();
    if (status !== 'all') params.set('status', status);
    if (system !== 'all') params.set('system', system);
    if (search) params.set('search', search);
    params.set('limit', '200');

    try {
      const res = await fetch(`${BASE}/api/v1/jobs?${params.toString()}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      jobs = data.jobs || [];
      renderStats(data.stats || {});
      renderJobsTable();
    } catch (e) {
      listEl.innerHTML = `<div class="empty-state"><p>Failed to load jobs.</p></div>`;
    }
  }

  function renderStats(stats) {
    const el = document.getElementById('stats-grid');
    el.innerHTML = `
      <div class="stat-card">
        <div class="stat-icon blue"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div><div class="stat-value">${stats.total || 0}</div><div class="stat-label">Total jobs</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div><div class="stat-value">${stats.needs_approval || 0}</div><div class="stat-label">Needs approval</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div><div class="stat-value">${stats.in_progress || 0}</div><div class="stat-label">In progress</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div><div class="stat-value">${stats.completed || 0}</div><div class="stat-label">Completed</div></div>
      </div>
    `;
  }

  function renderJobsTable() {
    const el = document.getElementById('jobs-list');
    if (jobs.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" stroke="#98A2B3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>No jobs match the current filters.</p>
        </div>`;
      return;
    }
    const rows = jobs.map(j => `
      <tr onclick="openJobModal('${j.id}')">
        <td>
          <div class="job-title">${escapeHtml(j.title)}</div>
          <div class="job-sub">${escapeHtml(j.jobNumber)} · ${escapeHtml(j.systemType)}</div>
        </td>
        <td>${j.assignedTo ? escapeHtml(j.assignedTo.name) : '<span class="job-sub">Unassigned</span>'}</td>
        <td><span class="badge status-${j.status}">${statusLabel(j.status)}</span></td>
        <td><span class="progress-text">${j.completedSteps}/${j.totalSteps} steps</span></td>
        <td>${formatDate(j.scheduledDate)}</td>
        <td>
          <div class="row-actions">
            <button class="btn-icon" title="View job" onclick="event.stopPropagation(); openJobModal('${j.id}')">
              <svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
    el.innerHTML = `
      <div class="table-wrap">
        <table class="jobs">
          <thead><tr><th>Job</th><th>Assigned</th><th>Status</th><th>Progress</th><th>Scheduled</th><th style="text-align:right">Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── Job detail modal ─────────────────────────────────────────────
  async function openJobModal(jobId) {
    currentJobId = jobId;
    document.getElementById('job-modal').classList.add('show');
    document.getElementById('job-modal-title').textContent = 'Loading…';
    document.getElementById('job-modal-status-badge').textContent = '';
    document.getElementById('job-modal-meta').innerHTML = '';
    document.getElementById('job-modal-body').innerHTML = '<div class="loading-row"><span class="spinner"></span>Loading job…</div>';
    await refreshJobModal();
  }

  async function refreshJobModal() {
    if (!currentJobId) return;
    try {
      const res = await fetch(`${BASE}/api/v1/jobs/${currentJobId}`, { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { logout(); return; }
      const job = await res.json();
      if (!res.ok) throw new Error(job.error || 'Failed to load job');
      renderJobModal(job);
    } catch (e) {
      document.getElementById('job-modal-body').innerHTML = `<div class="empty-state"><p>${escapeHtml(e.message)}</p></div>`;
    }
  }

  function closeJobModal() {
    document.getElementById('job-modal').classList.remove('show');
    currentJobId = null;
  }

  function renderJobModal(job) {
    document.getElementById('job-modal-title').textContent = `${job.title} · ${job.jobNumber}`;
    document.getElementById('job-modal-status-badge').className = `badge status-${job.status}`;
    document.getElementById('job-modal-status-badge').textContent = statusLabel(job.status);

    document.getElementById('job-modal-meta').innerHTML = `
      <div class="job-meta-item"><div class="label">Machine</div><div class="value">${escapeHtml(job.systemType)}</div></div>
      <div class="job-meta-item"><div class="label">Location</div><div class="value">${escapeHtml(job.location)}${job.address ? ', ' + escapeHtml(job.address) : ''}</div></div>
      <div class="job-meta-item"><div class="label">Company</div><div class="value">${job.company ? escapeHtml(job.company) : '—'}</div></div>
      <div class="job-meta-item"><div class="label">Assigned to</div><div class="value">${job.assignedTo ? escapeHtml(job.assignedTo.name) : '—'}</div></div>
      <div class="job-meta-item"><div class="label">Created by</div><div class="value">${job.createdBy ? escapeHtml(job.createdBy.name) : '—'}</div></div>
      <div class="job-meta-item"><div class="label">Scheduled</div><div class="value">${formatDate(job.scheduledDate)}</div></div>
    `;

    const approvalBanner = job.status === 'needs_approval' ? `
      <div class="approval-banner">
        <p>All steps are complete — ready for your review.</p>
        <div class="actions">
          <button class="btn btn-secondary btn-sm" onclick="rejectJob()">Send back</button>
          <button class="btn btn-success btn-sm" onclick="approveJob()">Approve</button>
        </div>
      </div>` : '';

    const stepsHtml = job.steps.map(s => renderStepRow(s, job)).join('');

    document.getElementById('job-modal-body').innerHTML = `
      ${approvalBanner}
      ${job.description ? `<p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:16px">${escapeHtml(job.description)}</p>` : ''}
      ${stepsHtml}
    `;
  }

  function renderStepRow(step, job) {
    if (step.inputType === 'section_header') {
      return `<div class="step-row section-header-row"><div class="step-section-title">${escapeHtml(step.title)}</div></div>`;
    }

    const photosHtml = (step.photos || []).map(p => {
      const url = p && (p.thumbnailUrl || p.filePath);
      const photoId = p && (p._id || p.id);
      if (!url || !photoId) return '';
      return `
        <div class="step-photo">
          <img src="${escapeHtml(url)}" onclick="window.open('${escapeHtml(p.filePath || url)}', '_blank')" />
          <button class="remove-photo" title="Remove photo" onclick="removePhoto('${photoId}')">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
    }).join('');

    let valueControl = '';
    if (step.inputType === 'text' || step.inputType === 'number') {
      valueControl = `<div class="step-value-row"><input type="text" id="step-value-${step.id}" value="${escapeHtml(step.inputValue)}" placeholder="No value entered" /></div>`;
    } else if (step.inputType === 'select' && (step.options || []).length > 0) {
      const opts = step.options.map(o => `<option value="${escapeHtml(o)}" ${o === step.inputValue ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('');
      valueControl = `<div class="step-value-row"><select id="step-value-${step.id}"><option value="">—</option>${opts}</select></div>`;
    }

    return `
      <div class="step-row">
        <div class="step-head">
          <input type="checkbox" id="step-done-${step.id}" ${step.isCompleted ? 'checked' : ''} />
          <div class="step-title-block">
            <div><span class="num">#${step.number}</span><span class="title">${escapeHtml(step.title)}</span></div>
            ${step.description ? `<div class="desc">${escapeHtml(step.description)}</div>` : ''}
          </div>
        </div>
        ${valueControl}
        ${photosHtml ? `<div class="step-photos">${photosHtml}</div>` : ''}
        <div class="step-notes">
          <textarea id="step-notes-${step.id}" placeholder="Notes…">${escapeHtml(step.notes)}</textarea>
        </div>
        <div class="step-footer">
          <span class="req-photo-flag">
            ${step.requiresPhoto ? '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Photo required' : ''}
          </span>
          <button class="btn btn-secondary btn-sm" onclick="saveStep('${step.id}')">Save changes</button>
        </div>
      </div>`;
  }

  async function saveStep(stepId) {
    if (!currentJobId) return;
    const doneEl = document.getElementById(`step-done-${stepId}`);
    const notesEl = document.getElementById(`step-notes-${stepId}`);
    const valueEl = document.getElementById(`step-value-${stepId}`);

    const body = {
      isCompleted: doneEl ? doneEl.checked : undefined,
      notes: notesEl ? notesEl.value : undefined,
    };
    if (valueEl) body.inputValue = valueEl.value;

    try {
      const res = await fetch(`${BASE}/api/v1/jobs/${currentJobId}/steps/${stepId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Save failed');
      showToast('Step updated', 'success');
      renderJobModal(data);
      await loadJobs();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function removePhoto(photoId) {
    const ok = await confirmModal('Remove photo?', 'This deletes the photo permanently from storage.', 'Remove');
    if (!ok) return;
    try {
      const res = await fetch(`${BASE}/api/v1/photos/${photoId}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) { const data = await res.json(); throw new Error(data.error || 'Failed to remove photo'); }
      showToast('Photo removed', 'success');
      await refreshJobModal();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function approveJob() {
    if (!currentJobId) return;
    try {
      const res = await fetch(`${BASE}/api/v1/jobs/${currentJobId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status: 'completed' }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Approve failed');
      showToast('Job approved', 'success');
      renderJobModal(data);
      await loadJobs();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function rejectJob() {
    if (!currentJobId) return;
    const ok = await confirmModal('Send job back?', 'This reopens the job as "in progress" so the installer can make corrections.', 'Send back');
    if (!ok) return;
    try {
      const res = await fetch(`${BASE}/api/v1/jobs/${currentJobId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status: 'in_progress' }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      showToast('Job sent back to installer', 'success');
      renderJobModal(data);
      await loadJobs();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (token) showApp();
  });
</script>
</body>
</html>
